name: Deploy → Google Play

# push a main  → Internal Testing (promover a producción desde Play Console)
# tag v*.*.*   → Production (revisión Google + publicación automática)
on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      skip_upload:
        description: "Solo construir AAB (sin subir a Play Store)"
        type: boolean
        default: false

# TEMPLATE: Reemplazar estos valores antes de usar
env:
  GODOT_VERSION: "4.7"
  EXPORT_PRESET: "Android"
  PACKAGE_NAME: "com.PLACEHOLDER_COMPANY.PLACEHOLDER_GAME"
  GAME_NAME: "PLACEHOLDER_GAME_NAME"

jobs:
  deploy:
    name: "Build AAB & Deploy (${{ github.ref_name }})"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Código ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Track y version code ─────────────────────────────────────────────
      - name: Determinar track y versión
        id: ctx
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "track=production" >> $GITHUB_OUTPUT
          else
            echo "track=internal"   >> $GITHUB_OUTPUT
          fi
          # Minutos desde 2024-01-01: compacto (~815k hoy), crece ~525k/año
          echo "version_code=$(( ($(date +%s) - 1704067200) / 60 ))" >> $GITHUB_OUTPUT

      # ── 3. Java (requerido por Gradle) ──────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ── 4. Godot headless ───────────────────────────────────────────────────
      - name: Instalar Godot ${{ env.GODOT_VERSION }}
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64.zip" \
            -O godot.zip
          unzip -q godot.zip
          mv "Godot_v${{ env.GODOT_VERSION }}-stable_linux.x86_64" /usr/local/bin/godot
          chmod +x /usr/local/bin/godot
          rm godot.zip

      # ── 5. Export templates ──────────────────────────────────────────────────
      # --install-android-build-template (paso 7) lee android_source.zip desde
      # esta carpeta y crea android/build/ + .build_version automáticamente.
      - name: Instalar export templates
        run: |
          wget -q \
            "https://github.com/godotengine/godot/releases/download/${{ env.GODOT_VERSION }}-stable/Godot_v${{ env.GODOT_VERSION }}-stable_export_templates.tpz" \
            -O templates.tpz

          TEMPLATES_DIR="$HOME/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable"
          mkdir -p "$TEMPLATES_DIR"
          unzip -q templates.tpz -d templates_tmp
          mv templates_tmp/templates/* "$TEMPLATES_DIR/"
          rm -rf templates_tmp templates.tpz

      # ── 6. Keystore de release + version code ───────────────────────────────
      # Secrets requeridos en GitHub: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_ALIAS,
      # ANDROID_KEYSTORE_PASS, GOOGLE_PLAY_JSON
      - name: Configurar keystore y version code
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

          sed -i "s|version/code=[0-9]*|version/code=${{ steps.ctx.outputs.version_code }}|" export_presets.cfg
          sed -i "s|gradle_build/use_gradle_build=false|gradle_build/use_gradle_build=true|" export_presets.cfg

          grep -E "version/code|gradle_build/use" export_presets.cfg

      # ── 7. Pre-heat Godot cache (evita crashes del scanner headless) ─────────
      - name: Pre-heat Godot cache
        run: godot --headless --editor --quit || true

      # ── 8. Instalar template + Exportar APK (popula android/build/) ──────────
      # Godot 4.7 requiere extensión .apk; el AAB se genera en el paso 9 con Gradle.
      - name: Exportar APK con Gradle template
        env:
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: /tmp/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          mkdir -p builds/
          godot --headless --verbose \
            --install-android-build-template \
            --export-release "${{ env.EXPORT_PRESET }}" \
            "builds/${{ env.GAME_NAME }}.apk"

      # ── 9. Construir AAB firmado con Gradle ─────────────────────────────────
      - name: Construir AAB con Gradle bundleRelease
        env:
          KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          # assetPackInstallTime necesita existir para bundleRelease (Godot 4.7)
          mkdir -p android/build/assetPackInstallTime/src/main/assets

          cd android/build
          ./gradlew bundleRelease \
            "-Pexport_package_name=${{ env.PACKAGE_NAME }}" \
            "-Pexport_version_code=${{ steps.ctx.outputs.version_code }}" \
            "-Pperform_signing=true" \
            "-Prelease_keystore_file=/tmp/release.keystore" \
            "-Prelease_keystore_password=$KEYSTORE_PASS" \
            "-Prelease_keystore_alias=$KEYSTORE_ALIAS"

          AAB=$(find . -name "*.aab" -path "*/standardRelease/*" | head -1)
          if [ -z "$AAB" ]; then
            AAB=$(find . -name "*.aab" -not -path "*/intermediates/*" | head -1)
          fi
          echo "AAB generado: $AAB"
          cp "$AAB" "../../builds/${{ env.GAME_NAME }}.aab"

      - name: Verificar AAB generado
        run: ls -lh builds/

      # ── 9b. Firmar AAB con jarsigner ────────────────────────────────────────
      # bundleRelease puede ignorar -Pperform_signing en Godot 4.7.
      # jarsigner (v1/JAR) es suficiente — Google Play reemplaza la firma al distribuir.
      - name: Firmar AAB con jarsigner
        env:
          KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEYSTORE_ALIAS }}
          KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore /tmp/release.keystore \
            -storepass "$KEYSTORE_PASS" \
            -keypass "$KEYSTORE_PASS" \
            "builds/${{ env.GAME_NAME }}.aab" \
            "$KEYSTORE_ALIAS"
          jarsigner -verify -verbose -certs "builds/${{ env.GAME_NAME }}.aab" | head -5

      # ── 10. Guardar artefacto ───────────────────────────────────────────────
      - name: Guardar AAB como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ steps.ctx.outputs.track }}-${{ github.run_number }}
          path: builds/${{ env.GAME_NAME }}.aab
          retention-days: 30

      # ── 11. Subir a Google Play ──────────────────────────────────────────────
      # NOTA: La primera subida debe ser manual desde Play Console.
      # La API de Google Play da error genérico hasta que exista una versión manual.
      - name: Subir a Google Play — track ${{ steps.ctx.outputs.track }}
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.skip_upload == false }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: builds/${{ env.GAME_NAME }}.aab
          track: ${{ steps.ctx.outputs.track }}
          status: completed
